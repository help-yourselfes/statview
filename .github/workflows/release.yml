name: Wails Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows/amd64
            os: windows-latest
          - platform: linux/amd64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            build-essential

      - name: Build Wails App
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            wails build -platform ${{ matrix.platform }} -tags webkit2gtk_4_1
          else
            wails build -platform ${{ matrix.platform }}
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: statview-${{ matrix.os }}
          path: build/bin/*